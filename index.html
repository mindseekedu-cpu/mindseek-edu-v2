<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindSeek.edu – Ai Mi</title>
  <style>
    /* CSS sama seperti sebelumnya, dipertahankan */
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #e9eef5 100%); min-height:100vh; padding:20px; }
    .container { max-width:1400px; margin:0 auto; }
    .header { background:white; border-radius:28px; padding:20px 28px; margin-bottom:24px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; }
    h1 { font-size:1.8rem; background:linear-gradient(135deg,#1e3c72,#2a5298); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .controls { background:white; border-radius:28px; padding:20px 28px; margin-bottom:24px; display:flex; flex-wrap:wrap; gap:20px; align-items:flex-end; }
    .control-group { display:flex; flex-direction:column; gap:6px; min-width:130px; }
    .control-group label { font-weight:600; font-size:0.75rem; color:#4a5b7a; }
    select, input, button { padding:10px 14px; border-radius:60px; border:1px solid #cfdfed; font-size:0.9rem; }
    button { background:#1e3c72; color:white; border:none; cursor:pointer; }
    button.secondary { background:#e9ecef; color:#1e3c72; }
    .chat-panel { background:white; border-radius:28px; overflow:hidden; margin-bottom:24px; }
    .chat-messages { height:400px; overflow-y:auto; padding:20px; background:#fafcff; display:flex; flex-direction:column; gap:12px; }
    .message { max-width:80%; padding:12px 18px; border-radius:24px; line-height:1.4; }
    .user { align-self:flex-end; background:#1e3c72; color:white; border-bottom-right-radius:6px; }
    .ai { align-self:flex-start; background:#f0f2f8; color:#1a2a4f; border-bottom-left-radius:6px; }
    .chat-input-area { display:flex; gap:12px; padding:16px 20px; border-top:1px solid #e2edf7; }
    .chat-input-area input { flex:1; }
    .file-label { background:#eef2f9; padding:10px 16px; border-radius:60px; cursor:pointer; }
    .loading { display:none; text-align:center; padding:8px; color:#2a5298; }
    .parent-panel { background:white; border-radius:28px; padding:20px; margin-top:16px; display:none; }
    .parent-panel.visible { display:block; }
    @media (max-width:700px) { .controls { flex-direction:column; } .message { max-width:95%; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧠 MindSeek.edu – Ai Mi</h1>
    <div class="badge" style="background:#f0f2f5; padding:8px 16px; border-radius:40px;">✨ Mandiri ✨</div>
  </div>
  <div class="controls">
    <div class="control-group"><label>Kelas</label><select id="gradeSelect"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select></div>
    <div class="control-group"><label>Mata Pelajaran</label><select id="subjectSelect"><option>Matematika</option><option>Sains_Nasional</option><option>Sains_Internasional</option></select></div>
    <div class="control-group"><label>Mode</label><select id="modeSelect"><option>pr</option><option>practice</option><option>exam</option></select></div>
    <div class="control-group"><label>Bahasa</label><select id="languageSelect"><option>id</option><option>en</option></select></div>
    <div class="control-group"><label>User ID</label><input id="userIdInput" value="demo001"></div>
    <button id="parentModeBtn" class="secondary">👪 Laporan</button>
  </div>
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"><div class="message ai">Halo! Aku Ai Mi. Pilih kelas, mapel, mode, lalu tanya atau upload tugas.</div></div>
    <div class="loading" id="loadingIndicator">🤖 Ai Mi sedang mengetik...</div>
    <div class="chat-input-area">
      <input type="text" id="messageInput" placeholder="Tanya atau jawab soal...">
      <label class="file-label">📎 Upload file<input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;"></label>
      <button id="sendBtn">Kirim</button>
    </div>
  </div>
  <div id="parentPanel" class="parent-panel"><h3>📊 Laporan</h3><div id="summaryContent"></div><button id="closeParentBtn" class="secondary">Tutup</button></div>
</div>
<script>
  // State
  let sessionId = localStorage.getItem('mindseek_sessionId') || ('session_'+Date.now()+'_'+Math.random().toString(36).substr(2,8));
  localStorage.setItem('mindseek_sessionId', sessionId);
  const DOM = {
    grade: document.getElementById('gradeSelect'), subject: document.getElementById('subjectSelect'),
    mode: document.getElementById('modeSelect'), language: document.getElementById('languageSelect'),
    userId: document.getElementById('userIdInput'), chatMessages: document.getElementById('chatMessages'),
    msgInput: document.getElementById('messageInput'), sendBtn: document.getElementById('sendBtn'),
    fileInput: document.getElementById('fileInput'), loading: document.getElementById('loadingIndicator'),
    parentBtn: document.getElementById('parentModeBtn'), parentPanel: document.getElementById('parentPanel'),
    summaryContent: document.getElementById('summaryContent'), closeParentBtn: document.getElementById('closeParentBtn')
  };
  function addMessage(text, isUser=false) { let div=document.createElement('div'); div.className=`message ${isUser?'user':'ai'}`; div.innerText=text; DOM.chatMessages.appendChild(div); DOM.chatMessages.scrollTop=DOM.chatMessages.scrollHeight; }
  function setLoading(loading) { DOM.loading.style.display = loading ? 'block' : 'none'; }
  
  async function uploadToSupabase(file) {
    const fileName = encodeURIComponent(file.name);
    const fileType = file.type;
    const res = await fetch('/api/generate-upload-url', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ fileName, fileType })
    });
    if (!res.ok) throw new Error('Gagal dapat signed URL');
    const { signedUrl, publicUrl } = await res.json();
    // Upload file ke signed URL
    const uploadRes = await fetch(signedUrl, { method: 'PUT', body: file, headers: { 'Content-Type': fileType } });
    if (!uploadRes.ok) throw new Error('Gagal upload ke storage');
    return publicUrl;
  }
  
  async function performOCR(file) {
    setLoading(true);
    try {
      const publicUrl = await uploadToSupabase(file);
      const ocrRes = await fetch('/api/ocr', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ fileUrl: publicUrl }) });
      const data = await ocrRes.json();
      if (!data.success) throw new Error(data.error);
      return data.text;
    } catch (err) { console.error(err); addMessage('❌ OCR gagal: '+err.message, false); return null; }
    finally { setLoading(false); }
  }
  
  async function sendToAI(userMessage, ocrText=null) {
    let finalMsg = userMessage;
    if (ocrText) finalMsg = userMessage ? `${userMessage}\n\n[OCR]: ${ocrText}` : `[Hasil scan]: ${ocrText}`;
    setLoading(true);
    try {
      const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
        mode: DOM.mode.value, grade: DOM.grade.value, topic: DOM.subject.value, subject: DOM.subject.value,
        language: DOM.language.value, message: finalMsg, sessionId, userId: DOM.userId.value.trim() || 'demo001'
      })});
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error || 'Gagal');
      addMessage(data.reply, false);
    } catch(e) { addMessage('⚠️ Ai Mi sibuk, coba lagi', false); }
    finally { setLoading(false); }
  }
  
  async function checkExamUnlock() { // simple
    if (DOM.mode.value !== 'exam') return true;
    const userId = DOM.userId.value.trim() || 'demo001';
    const grade = DOM.grade.value; const subject = DOM.subject.value;
    try {
      const res = await fetch(`/api/exam-unlock?userId=${userId}&grade=${grade}&subject=${subject}`);
      const data = await res.json();
      if (!data.unlocked) { alert('Belum bisa ujian. Selesaikan topik minimal 80% mandiri.'); return false; }
      return true;
    } catch(e) { return false; }
  }
  
  DOM.fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    addMessage(`📎 Upload ${file.name}...`, true);
    const ocrText = await performOCR(file);
    if (ocrText) {
      addMessage(`📄 Hasil scan: "${ocrText.substring(0,150)}${ocrText.length>150?'…':''}"`, false);
      DOM.msgInput.value = ocrText; // langsung tempel ke input
    }
    DOM.fileInput.value = '';
  });
  
  DOM.sendBtn.addEventListener('click', async () => {
    let msg = DOM.msgInput.value.trim();
    if (!msg) { addMessage('Tulis pesan atau upload file', true); return; }
    addMessage(msg, true);
    if (DOM.mode.value === 'exam') { const ok = await checkExamUnlock(); if (!ok) { DOM.msgInput.value=''; return; } }
    await sendToAI(msg);
    DOM.msgInput.value = '';
  });
  DOM.msgInput.addEventListener('keypress', (e) => { if(e.key==='Enter') DOM.sendBtn.click(); });
  
  async function showLearningSummary() {
    const userId = DOM.userId.value.trim() || 'demo001';
    DOM.summaryContent.innerHTML = 'Memuat...';
    DOM.parentPanel.classList.add('visible');
    try {
      const res = await fetch(`/api/learning-summary?userId=${userId}`);
      const data = await res.json();
      let html = `<div>Total soal: ${data.summary.totalQuestions}<br>Rata2 mandiri: ${Math.round(data.summary.averageIndependence*100)}%<br>Topik dikuasai: ${data.summary.totalTopicsMastered}/${data.summary.totalTopicsPracticed}</div><hr>`;
      html += `<h4>Progress topik</h4><ul>${data.topicsProgress.slice(0,10).map(t=>`<li>${t.topic}: ${Math.round(t.independentPercent*100)}% (${t.status})</li>`).join('')}</ul>`;
      DOM.summaryContent.innerHTML = html;
    } catch(e) { DOM.summaryContent.innerHTML = 'Gagal load laporan'; }
  }
  DOM.parentBtn.addEventListener('click', showLearningSummary);
  DOM.closeParentBtn.addEventListener('click', () => DOM.parentPanel.classList.remove('visible'));
</script>
</body>
</html>
