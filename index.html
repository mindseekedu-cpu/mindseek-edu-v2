<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MindSeek.edu – Ai Mi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: #f1f5f9;
      height: 100vh;
      overflow: hidden;
    }

    /* Layout utama */
    .app {
      display: flex;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: white;
      box-shadow: 4px 0 20px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      z-index: 20;
      overflow-y: auto;
      padding: 24px 16px;
      gap: 24px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eef2f6;
    }
    .logo h2 {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    /* Control groups di sidebar */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .control-group label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5b6e8c;
    }
    select, input, button {
      padding: 10px 14px;
      border-radius: 60px;
      border: 1px solid #e2e8f0;
      background: white;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }
    select:focus, input:focus, button:focus {
      border-color: #2a5298;
      box-shadow: 0 0 0 2px rgba(42,82,152,0.2);
    }
    button {
      background: #1e3c72;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    button.secondary {
      background: #f1f5f9;
      color: #1e3c72;
      border: 1px solid #cbd5e1;
    }
    button.outline {
      background: transparent;
      border: 1px solid #cbd5e1;
      color: #2c3e66;
    }

    /* Main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      overflow: hidden;
      position: relative;
    }

    /* Header chat */
    .chat-header {
      background: white;
      padding: 16px 24px;
      border-bottom: 1px solid #eef2f6;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #1e3c72;
      padding: 4px 8px;
    }
    .header-title h3 {
      font-size: 1.4rem;
      font-weight: 600;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .badge {
      background: #eef2ff;
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      color: #1e3c72;
    }

    /* Chat messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .message {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: 24px;
      line-height: 1.45;
      animation: fadeIn 0.2s ease;
      font-size: 0.95rem;
    }
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      border-bottom-right-radius: 6px;
    }
    .message.ai {
      align-self: flex-start;
      background: white;
      color: #1e2c44;
      border-bottom-left-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      border: 1px solid #eef2f6;
    }
    /* Input area */
    .input-area {
      background: white;
      border-top: 1px solid #eef2f6;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .input-wrapper {
      flex: 1;
      display: flex;
      gap: 12px;
      background: #f8fafc;
      border-radius: 60px;
      padding: 4px 8px 4px 20px;
      border: 1px solid #e2e8f0;
      transition: 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: #2a5298;
      box-shadow: 0 0 0 2px rgba(42,82,152,0.1);
    }
    .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 0;
    }
    .input-wrapper input:focus {
      outline: none;
      box-shadow: none;
    }
    .file-label, .send-btn {
      background: #eef2ff;
      border: none;
      padding: 10px 16px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .send-btn {
      background: #1e3c72;
      color: white;
    }
    .loading {
      display: none;
      text-align: center;
      padding: 12px;
      color: #2a5298;
      font-weight: 500;
    }
    .loading::after {
      content: " ...";
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    /* Parent panel modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal.visible {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: white;
      max-width: 90vw;
      width: 600px;
      max-height: 80vh;
      border-radius: 32px;
      padding: 24px;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .menu-toggle {
        display: block;
      }
      .message {
        max-width: 95%;
      }
      .input-area {
        padding: 12px;
      }
      .input-wrapper {
        padding-left: 12px;
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }
    hr {
      margin: 8px 0;
      border-color: #eef2f6;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <span style="font-size: 28px;">🧠</span>
      <h2>MindSeek.edu</h2>
    </div>
    <div class="control-group">
      <label>Kelas</label>
      <select id="gradeSelect">
        <option value="1">Kelas 1</option><option value="2">Kelas 2</option>
        <option value="3">Kelas 3</option><option value="4">Kelas 4</option>
        <option value="5">Kelas 5</option><option value="6">Kelas 6</option>
      </select>
    </div>
    <div class="control-group">
      <label>Mata Pelajaran</label>
      <select id="subjectSelect">
        <option value="Matematika">Matematika</option>
        <option value="Sains_Nasional">Sains Nasional (IPAS)</option>
        <option value="Sains_Internasional">Sains Internasional</option>
      </select>
    </div>
    <div class="control-group">
      <label>Topik</label>
      <select id="topicSelect"></select>
    </div>
    <div class="control-group">
      <label>Mode</label>
      <select id="modeSelect">
        <option value="pr">PR (Petunjuk)</option>
        <option value="practice">Practice (Latihan)</option>
        <option value="exam">Exam (Ujian)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Bahasa</label>
      <select id="languageSelect">
        <option value="id">Bahasa Indonesia</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="control-group">
      <label>User ID (Anak)</label>
      <input type="text" id="userIdInput" value="demo001">
    </div>
    <button id="parentModeBtn" class="secondary">👪 Mode Orang Tua</button>
    <button id="newChatBtn" class="outline">+ Chat Baru</button>
  </div>

  <!-- Main area -->
  <div class="main">
    <div class="chat-header">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="header-title">
        <h3>🤖 Ai Mi</h3>
        <div class="badge">Guru Pribadimu</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message ai">Halo! Aku Ai Mi. Pilih kelas, mapel, topik, mode, lalu mulai belajar. Kamu bisa upload tugas (gambar/PDF) juga ✨</div>
    </div>
    <div class="loading" id="loadingIndicator">Ai Mi sedang mengetik</div>
    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="Ketik pesan atau jawaban...">
      </div>
      <label class="file-label">📎 Upload<input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;"></label>
      <button class="send-btn" id="sendBtn">Kirim</button>
    </div>
  </div>
</div>

<!-- Modal parent -->
<div id="parentModal" class="modal">
  <div class="modal-content">
    <h3>📊 Laporan Perkembangan</h3>
    <div id="summaryContent">Memuat...</div>
    <button id="closeParentModal" class="secondary" style="margin-top:16px;">Tutup</button>
  </div>
</div>

<script>
  // ---------- CURRICULUM DATA (salin dari lib/curriculum.js) ----------
  const matematika = {
    "1": ["Bilangan 1-20","Penjumlahan & Pengurangan (1-10)","Bilangan 1-50","Pengukuran (Panjang/Berat)","Geometri 2D"],
    "2": ["Bilangan 1-100","Penjumlahan/Pengurangan (1-20)","Perkalian Dasar","Pembagian Dasar","Waktu","Uang","Geometri"],
    "3": ["Bilangan 1-1000","Operasi Hitung (+,-)","Perkalian","Pembagian","Pecahan Dasar","Bangun Datar"],
    "4": ["Bilangan Besar","Pembagian Bersusun","Luas & Keliling","Pecahan Senilai","Pola Bilangan","Pengolahan Data","Sudut"],
    "5": ["Operasi Hitung Pecahan","Bangun Ruang","Desimal","Persentase","Perbandingan","Pengolahan Data","Koordinat"],
    "6": ["Bilangan Bulat","Operasi Campuran","Bangun Ruang (Volume & Luas)","Statistika","Aljabar Dasar"]
  };
  const sainsNasional = {
    "1": ["Anggota Tubuh","Panca Indra","Benda di Sekitar","Tanaman","Keluarga","Aturan di Rumah/Sekolah"],
    "2": ["Bagian Tubuh Hewan & Tumbuhan","Mengukur Benda","Cuaca","Lingkungan Sehat","Ekosistem","Sumber Daya"],
    "3": ["Siklus Hidup","Wujud Zat & Perubahan","Norma Sosial","Energi (Cahaya & Bunyi)","Denah/Peta"],
    "4": ["Fotosintesis","Gaya","Wujud Zat","Transformasi Energi","Sejarah Daerah","Kekayaan Budaya"],
    "5": ["Sistem Pencernaan & Pernapasan","Ekosistem","Listrik & Magnet","Lingkungan"],
    "6": ["Perkembangbiakan","Tata Surya","Kelistrikan","Isu Global (Iklim)","Peran Indonesia"]
  };
  const sainsInternasional = {
    "1": ["Living vs Non-living","Parts of Plants","Senses","Materials"],
    "2": ["Life Cycles","Habitats","Forces (Push/Pull)","Light"],
    "3": ["Human Skeleton","States of Matter","Light & Shadows","Electricity (Circuits)"],
    "4": ["Digestive System","Sound","Environment","Rocks"],
    "5": ["Circulatory System","Forces & Friction","Space & Solar System"],
    "6": ["Micro-organisms","Classification","Energy Transfer","Human Impact"]
  };
  function getTopicsForSubject(subject, grade) {
    if (subject === 'Matematika') return matematika[grade] || [];
    if (subject === 'Sains_Nasional') return sainsNasional[grade] || [];
    return sainsInternasional[grade] || [];
  }

  // DOM elements
  const gradeSelect = document.getElementById('gradeSelect');
  const subjectSelect = document.getElementById('subjectSelect');
  const topicSelect = document.getElementById('topicSelect');
  const modeSelect = document.getElementById('modeSelect');
  const languageSelect = document.getElementById('languageSelect');
  const userIdInput = document.getElementById('userIdInput');
  const chatMessages = document.getElementById('chatMessages');
  const msgInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const fileInput = document.getElementById('fileInput');
  const loadingIndicator = document.getElementById('loadingIndicator');
  const parentBtn = document.getElementById('parentModeBtn');
  const parentModal = document.getElementById('parentModal');
  const summaryContent = document.getElementById('summaryContent');
  const closeParentModal = document.getElementById('closeParentModal');
  const newChatBtn = document.getElementById('newChatBtn');
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');

  // State
  let sessionId = localStorage.getItem('mindseek_sessionId');
  if (!sessionId) {
    sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    localStorage.setItem('mindseek_sessionId', sessionId);
  }

  // Helper UI
  function addMessage(text, isUser = false) {
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : 'ai'}`;
    div.innerText = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
  function setLoading(loading) {
    loadingIndicator.style.display = loading ? 'block' : 'none';
  }
  function updateTopicDropdown() {
    const grade = gradeSelect.value;
    const subject = subjectSelect.value;
    const topics = getTopicsForSubject(subject, grade);
    topicSelect.innerHTML = '';
    if (topics.length === 0) {
      const opt = document.createElement('option');
      opt.value = 'Umum';
      opt.text = 'Umum';
      topicSelect.appendChild(opt);
    } else {
      topics.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.text = t;
        topicSelect.appendChild(opt);
      });
    }
  }
  gradeSelect.addEventListener('change', updateTopicDropdown);
  subjectSelect.addEventListener('change', updateTopicDropdown);
  updateTopicDropdown();

  // ---------- API Functions (sama seperti sebelumnya) ----------
  async function uploadToSupabase(file) {
    const fileName = encodeURIComponent(file.name);
    const fileType = file.type;
    const res = await fetch('/api/generate-upload-url', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fileName, fileType })
    });
    if (!res.ok) throw new Error('Gagal dapat signed URL');
    const { signedUrl, filePath } = await res.json();
    const uploadRes = await fetch(signedUrl, { method: 'PUT', body: file, headers: { 'Content-Type': fileType } });
    if (!uploadRes.ok) throw new Error('Gagal upload ke storage');
    return filePath;
  }

  async function compressImage(file) {
    return new Promise((resolve, reject) => {
      if (!file.type.startsWith('image/')) {
        resolve(file);
        return;
      }
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          const maxDim = 1000;
          if (width > maxDim || height > maxDim) {
            if (width > height) {
              height = (height * maxDim) / width;
              width = maxDim;
            } else {
              width = (width * maxDim) / height;
              height = maxDim;
            }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => {
            resolve(new File([blob], file.name, { type: file.type }));
          }, file.type, 0.7);
        };
        img.onerror = reject;
      };
      reader.onerror = reject;
    });
  }

  async function performOCR(file) {
    setLoading(true);
    try {
      let fileToUpload = file;
      if (file.type.startsWith('image/')) {
        fileToUpload = await compressImage(file);
        console.log('Ukuran setelah kompresi:', (fileToUpload.size / 1024).toFixed(0), 'KB');
      }
      const filePath = await uploadToSupabase(fileToUpload);
      const ocrRes = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filePath })
      });
      const data = await ocrRes.json();
      if (!data.success) throw new Error(data.error);
      return data.text;
    } catch (err) {
      console.error(err);
      addMessage('❌ OCR gagal: ' + err.message, false);
      return null;
    } finally {
      setLoading(false);
    }
  }
  
  async function sendToAI(userMessage, ocrText = null) {
    let finalMsg = userMessage;
    if (ocrText) finalMsg = userMessage ? `${userMessage}\n\n[OCR]: ${ocrText}` : `[Hasil scan]: ${ocrText}`;
    setLoading(true);
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: modeSelect.value,
          grade: gradeSelect.value,
          topic: topicSelect.value,
          subject: subjectSelect.value,
          language: languageSelect.value,
          message: finalMsg,
          sessionId,
          userId: userIdInput.value.trim() || 'demo001'
        })
      });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error || 'Gagal');
      addMessage(data.reply, false);
    } catch (e) {
      addMessage('⚠️ Ai Mi sibuk, coba lagi', false);
    } finally {
      setLoading(false);
    }
  }

  async function checkExamUnlock() {
    if (modeSelect.value !== 'exam') return true;
    const userId = userIdInput.value.trim() || 'demo001';
    const grade = gradeSelect.value;
    const subject = subjectSelect.value;
    try {
      const res = await fetch(`/api/exam-unlock?userId=${userId}&grade=${grade}&subject=${subject}`);
      const data = await res.json();
      if (!data.unlocked) {
        alert('Belum bisa ujian. Selesaikan topik minimal 80% mandiri.');
        return false;
      }
      return true;
    } catch (e) { return false; }
  }

  // File upload handler
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    addMessage(`📎 Upload ${file.name}...`, true);
    const ocrText = await performOCR(file);
    if (ocrText) {
      addMessage(`📄 Hasil scan: "${ocrText.substring(0, 150)}${ocrText.length > 150 ? '…' : ''}"`, false);
      msgInput.value = ocrText;
    }
    fileInput.value = '';
  });

  sendBtn.addEventListener('click', async () => {
    let msg = msgInput.value.trim();
    if (!msg) {
      addMessage('Tulis pesan atau upload file', true);
      return;
    }
    addMessage(msg, true);
    if (modeSelect.value === 'exam') {
      const ok = await checkExamUnlock();
      if (!ok) {
        msgInput.value = '';
        return;
      }
    }
    await sendToAI(msg);
    msgInput.value = '';
  });

  msgInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });

  // Parent mode
  async function showLearningSummary() {
    const userId = userIdInput.value.trim() || 'demo001';
    summaryContent.innerHTML = 'Memuat laporan...';
    parentModal.classList.add('visible');
    try {
      const res = await fetch(`/api/learning-summary?userId=${userId}`);
      const data = await res.json();
      let html = `<div>Total soal: ${data.summary.totalQuestions}<br>Rata2 mandiri: ${Math.round(data.summary.averageIndependence * 100)}%<br>Topik dikuasai: ${data.summary.totalTopicsMastered}/${data.summary.totalTopicsPracticed}</div><hr>`;
      html += `<h4>Progress topik</h4><ul>${data.topicsProgress.slice(0, 10).map(t => `<li><strong>${t.topic}</strong> (kelas ${t.grade}) : ${Math.round(t.independentPercent * 100)}% (${t.status})</li>`).join('')}</ul>`;
      html += `<h4>Butuh pendampingan: ${data.pendingGuidance.length}</h4><ul>${data.pendingGuidance.slice(0, 5).map(g => `<li>${g.questionText.substring(0, 80)}</li>`).join('')}</ul>`;
      summaryContent.innerHTML = html;
    } catch (e) {
      summaryContent.innerHTML = 'Gagal memuat laporan';
    }
  }
  parentBtn.addEventListener('click', showLearningSummary);
  closeParentModal.addEventListener('click', () => parentModal.classList.remove('visible'));

  // New chat: reset sessionId dan clear chat
  newChatBtn.addEventListener('click', () => {
    sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    localStorage.setItem('mindseek_sessionId', sessionId);
    chatMessages.innerHTML = '<div class="message ai">Chat baru dimulai! Aku Ai Mi, siap membantu belajar ✨</div>';
  });

  // Toggle sidebar di mobile
  menuToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });
  // Tutup sidebar saat klik di luar (optional)
  document.addEventListener('click', (e) => {
    if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  });
</script>
</body>
</html>
